:root {

}
* { margin: 0; padding: 0; box-sizing: border-box; }

.top-nav {

  background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
  box-shadow: var(--shadow-sm); z-index: 998;

}
.top-nav.scrolled { box-shadow: var(--shadow); }
.nav-brand {

.nav-links a {
  text-decoration: none; color: var(--text-light); font-size: 0.95rem; font-weight: 500;

}
.nav-links a::after {
  content: ''; position: absolute; bottom: -4px; left: 0;
  width: 0; height: 2px; background: var(--accent); transition: var(--transition);
}
.nav-links a:hover,.nav-links a.active { color: var(--accent); }
.nav-links a:hover::after,.nav-links a.active::after { width: 100%; }
.menu-toggle {
  display: none; position: fixed; top: 16px; right: 20px; z-index: 1000;
  cursor: pointer; width: 32px; height: 32px; flex-direction: column;
  justify-content: center; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.9); border-radius: 6px;
  padding: 4px; box-shadow: var(--shadow-sm);
}
.menu-toggle span { display: block; width: 20px; height: 2.5px; background: var(--primary); border-radius: 2px; transition: 0.3s; }
.menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
.menu-toggle.active span:nth-child(2) { opacity: 0; }
.menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }
.menu {
  position: fixed; top: 0; right: -320px; width: 320px; height: 100vh;
  background: linear-gradient(135deg,#fff 0%,#f8fafc 100%);
  box-shadow: -10px 0 30px rgba(0,0,0,0.1); transition: right 0.35s cubic-bezier(0.4,0,0.2,1);

}
.menu.active { right: 0; }
.menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 998; }
.menu-overlay.active { opacity: 1; visibility: visible; }
.menu ul { list-style: none; }

}
.menu ul li a:hover,.menu ul li a.active { background: var(--accent-light); color: var(--accent); }
.menu-divider { height: 1px; background: linear-gradient(to right,transparent,#e0e0e0,transparent); margin: 15px 0; }

.close-btn:hover { background: var(--accent-light); color: var(--accent); }

footer { background: linear-gradient(135deg,#1a252f 0%,#2c3e50 100%); color: rgba(255,255,255,0.8); text-align: center; padding: 50px 20px 30px; margin-top: 60px; position: relative; }
footer::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg,var(--accent),#5dade2,var(--success),#2ecc71); }
.footer-content { max-width: 800px; margin: 0 auto; }

.back-to-top.visible { opacity: 1; visibility: visible; }
.back-to-top:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(52,152,219,0.5); }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
.animate-in { animation: fadeInUp 0.6s ease forwards; }

.page-header h1 { font-size:2.5rem; color:var(--primary); margin-bottom:12px; }

.dl-search-box { display:flex;background:#fff;border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid rgba(0,0,0,0.08); }
.dl-search-box input { flex:1;border:none;outline:none;padding:14px 18px;font-size:1rem;background:transparent;border-left:4px solid var(--accent); }
.dl-search-box button { background:linear-gradient(135deg,var(--success) 0%,#219a52 100%);color:#fff;border:none;padding:14px 28px;font-weight:600;cursor:pointer;transition:var(--transition);font-size:0.95rem; }

.results-info { text-align:center;color:var(--text-muted);font-size:0.95rem;margin-bottom:30px; }
.results-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:25px;max-width:1000px;margin:0 auto; }
.result-card { background:var(--card-bg);border-radius:var(--radius);padding:30px;box-shadow:var(--shadow-sm);transition:var(--transition);border:1px solid rgba(0,0,0,0.04);position:relative;overflow:hidden; }
.result-card::before { content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),#5dade2);transform:scaleX(0);transform-origin:left;transition:var(--transition); }
.result-card:hover { transform:translateY(-6px);box-shadow:var(--shadow-lg); }
.result-card:hover::before { transform:scaleX(1); }
.result-icon { width:52px;height:52px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:18px;background:var(--icon-bg); }
.result-card .category { display:inline-block;background:var(--accent-light);color:var(--accent);padding:3px 10px;border-radius:50px;font-size:0.75rem;font-weight:600;margin-bottom:10px; }
.result-card h3 { font-size:1.2rem;color:var(--primary);margin-bottom:10px; }
.result-card p { color:var(--text-light);font-size:0.95rem;line-height:1.6;margin-bottom:18px; }
.result-card a { display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--success) 0%,#219a52 100%);color:#fff;padding:10px 24px;border-radius:50px;text-decoration:none;font-weight:600;font-size:0.9rem;transition:var(--transition);box-shadow:0 3px 12px rgba(39,174,96,0.3); }
.result-card a:hover { transform:translateY(-2px);box-shadow:0 6px 20px rgba(39,174,96,0.4); }
.no-results { text-align:center;padding:60px 20px; }
.no-results h3 { font-size:1.4rem;color:var(--primary);margin-bottom:12px; }
.no-results p { color:var(--text-light);font-size:1rem; }
@media(max-width:768px){ .page-header h1{font-size:2rem} .results-grid{grid-template-columns:1fr} .dl-search-wrap{padding:0 15px;margin-bottom:25px;} .dl-search-box input{padding:12px 14px;font-size:0.9rem;} .dl-search-box button{padding:12px 20px;font-size:0.85rem;} }
@media(max-width:480px){ .page-header h1{font-size:1.7rem} }

  <script>
const ICON_BG = 'linear-gradient(135deg, #f0f2f5 0%, #d5dbe3 100%)';
function normalizeText(text) {
  return (text || '').toString().toLowerCase().replace(/[\p{P}\p{S}_]+/gu, ' ').replace(/\s+/g, ' ').trim();
}

function splitTokens(text) {
  return normalizeText(text).split(' ').filter(Boolean);
}

function isGitHubUrl(url) {
  return /^https?:\/\/(?:www\.)?github\.com\//i.test(url);
}

function getQueryParam(name) {
  var params = new URLSearchParams(window.location.search);
  return params.get(name) || '';
}

function updateUrlQuery(q) {
  var url = 'search.html?q=' + encodeURIComponent(q);
  if (window.location.search !== '?q=' + encodeURIComponent(q)) {
    history.replaceState(null, '', url);
  }
}

function doSearch() {
  var q = document.getElementById('searchInput').value.trim();
  if (!q) {
    renderResults('');
    updateUrlQuery('');
    return;
  }
  updateUrlQuery(q);
  renderResults(q);
}

document.getElementById('searchInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') doSearch();
});

function calcScore(item, query) {
  var total = 0;
  var normalizedQuery = normalizeText(query);
  var title = normalizeText(item.title);
  var desc = normalizeText(item.desc);
  var category = normalizeText(item.category || '');
  var url = normalizeText(item.url || '');
  var tokens = splitTokens(normalizedQuery);

  if (!normalizedQuery) return 0;
  if (title === normalizedQuery) total += 220;
  if (title.indexOf(normalizedQuery) !== -1) total += 120;
  if (desc.indexOf(normalizedQuery) !== -1) total += 40;
  if (category.indexOf(normalizedQuery) !== -1) total += 25;

  tokens.forEach(function(token) {
    if (title.indexOf(token) !== -1) total += 55;
    if (title.startsWith(token)) total += 25;
    if (desc.indexOf(token) !== -1) total += 18;
    if (category.indexOf(token) !== -1) total += 12;
    if (url.indexOf(token) !== -1) total += 8;
  });

  var overlap = 0;
  normalizedQuery.split('').forEach(function(ch) {
    if (ch && title.indexOf(ch) !== -1) overlap += 1;
  });
  if (normalizedQuery.length > 0) {
    total += Math.min(35, Math.round((overlap / normalizedQuery.length) * 35));
  }

  return total;
}

function renderResults(query) {
  var container = document.getElementById('resultsContainer');
  var info = document.getElementById('resultsInfo');

  if (!query) {
    container.innerHTML = '<div class="no-results" style="grid-column:1/-1;"><h3>请输入关键词开始搜索</h3><p>你可以搜索项目名称、脚本功能、Termux 工具等。</p></div>';
    info.textContent = '';
    return;
  }

  if (typeof downloadsData === 'undefined') {
    container.innerHTML = '<div class="no-results" style="grid-column:1/-1;"><h3>⏳ 数据加载中</h3><p>请刷新页面重试</p></div>';
    return;
  }

  var all = [];
  if (downloadsData.scripts) {
    downloadsData.scripts.forEach(function(item) {
      all.push({ title: item.title, desc: item.desc, icon: item.icon, url: item.url, category: '脚本工具' });
    });
  }
  if (downloadsData.projects) {
    downloadsData.projects.forEach(function(item) {
      all.push({ title: item.title, desc: item.desc, icon: item.icon, url: item.url, category: '项目' });
    });
  }
  if (downloadsData.resources) {
    downloadsData.resources.forEach(function(item) {
      all.push({ title: item.title, desc: item.desc, icon: item.icon, url: item.url, category: '更多资源' });
    });
  }

  var results = all.map(function(item) {
    return Object.assign({ score: calcScore(item, query) }, item);
  }).filter(function(item) {
    return item.score > 0;
  });

  results.sort(function(a, b) {
    return b.score - a.score;
  });

  info.textContent = '共找到 ' + results.length + ' 个相关结果' + (query ? '，关键词："' + query + '"' : '');

  if (results.length === 0) {
    container.innerHTML = '<div class="no-results" style="grid-column:1/-1;"><h3>😕 未找到相关资源</h3><p>换个关键词试试，或前往 <a href="downloads.html" style="color:var(--accent);text-decoration:none;font-weight:600;">下载中心</a> 浏览全部资源</p></div>';
    return;
  }

  var html = results.map(function(item) {
    var linkHref = './github-redirect.html?target=' + encodeURIComponent(item.url);
    var linkRel = 'noopener noreferrer';
    return '<div class="result-card">'
      + '<div class="result-icon" style="background:' + ICON_BG + '">' + item.icon + '</div>'
      + '<span class="category">' + item.category + '</span>'
      + '<h3>' + item.title + '</h3>'
      + '<p>' + item.desc + '</p>'
      + '<a href="' + linkHref + '" target="_blank" rel="' + linkRel + '"><span>📥</span> 前往仓库下载</a>'
      + '</div>';
  }).join('');

  container.innerHTML = html;

  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('animate-in');
        obs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

  document.querySelectorAll('.result-card').forEach(function(card) {
    card.style.opacity = '0';
    obs.observe(card);
  });
}

function initSearchPage() {
  var initQuery = getQueryParam('q');
  if (initQuery) {
    document.getElementById('searchInput').value = initQuery;
    renderResults(initQuery);
  } else {
    renderResults('');
  }
}

initSearchPage();

const menuToggle = document.getElementById('menuToggle');
const menu = document.getElementById('menu');
const closeMenuBtn = document.getElementById('closeMenu');
const menuOverlay = document.getElementById('menuOverlay');

function openMenu() {
  menu.classList.add('active');
  menuOverlay.classList.add('active');
  menuToggle.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeMenuFn() {
  menu.classList.remove('active');
  menuOverlay.classList.remove('active');
  menuToggle.classList.remove('active');
  document.body.style.overflow = '';
}

if (menuToggle) {
  menuToggle.addEventListener('click', function() {
    menu.classList.contains('active') ? closeMenuFn() : openMenu();
  });
}
if (closeMenuBtn) closeMenuBtn.addEventListener('click', closeMenuFn);
if (menuOverlay) menuOverlay.addEventListener('click', closeMenuFn);

const topNav = document.getElementById('topNav');
if (topNav) {
  window.addEventListener('scroll', function() {
    window.scrollY > 50 ? topNav.classList.add('scrolled') : topNav.classList.remove('scrolled');
  });
}

const btt = document.getElementById('backToTop');
if (btt) {
  window.addEventListener('scroll', function() {
    window.scrollY > 400 ? btt.classList.add('visible') : btt.classList.remove('visible');
  });
  btt.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
}
